name: Telegram Notify

on:
  issues:
    types:
      - opened
      - closed
      - reopened

permissions:
  issues: read
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: -1001979197532
          TELEGRAM_TOPIC_ID: 963
        run: |
          ACTION="${{ github.event.action }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"
          REPO="${{ github.repository }}"

          # Set emoji based on action
          case $ACTION in
            opened) EMOJI="🆕" ;;
            closed) EMOJI="✅" ;;
            reopened) EMOJI="🔄" ;;
          esac

          # Format message (simple, no body preview)
          MESSAGE="$EMOJI Issue ${ACTION}: ${ISSUE_TITLE} (#${ISSUE_NUMBER}) - ${REPO} - ${ISSUE_URL}"

          # Send to Telegram
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_TOPIC_ID}" \
            -d "text=${MESSAGE}"
