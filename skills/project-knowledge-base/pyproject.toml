[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [".venv", ".pytest_cache", "verify_google_auth.py", "verify_telegram.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
pretty = true
exclude = ["^tests/"]
